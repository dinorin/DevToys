<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f0e1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#glow)"/>

  <!-- Top-left decorative dots grid -->
  <g opacity="0.18" fill="#818cf8">
    <circle cx="180" cy="180" r="12"/>
    <circle cx="240" cy="180" r="12"/>
    <circle cx="300" cy="180" r="12"/>
    <circle cx="180" cy="240" r="12"/>
    <circle cx="240" cy="240" r="8"/>
    <circle cx="300" cy="240" r="12"/>
    <circle cx="180" cy="300" r="12"/>
    <circle cx="240" cy="300" r="12"/>
    <circle cx="300" cy="300" r="12"/>
  </g>
  <!-- Bottom-right decorative dots grid -->
  <g opacity="0.18" fill="#818cf8">
    <circle cx="724" cy="724" r="12"/>
    <circle cx="784" cy="724" r="12"/>
    <circle cx="844" cy="724" r="12"/>
    <circle cx="724" cy="784" r="12"/>
    <circle cx="784" cy="784" r="8"/>
    <circle cx="844" cy="784" r="12"/>
    <circle cx="724" cy="844" r="12"/>
    <circle cx="784" cy="844" r="12"/>
    <circle cx="844" cy="844" r="12"/>
  </g>

  <!-- Wrench icon centered, drawn manually for crispness -->
  <!-- Main wrench body -->
  <g filter="url(#shadow)" transform="translate(512,512)">
    <g transform="rotate(-45)">
      <!-- Wrench handle -->
      <rect x="-52" y="20" width="104" height="280" rx="52" ry="52" fill="url(#accent)"/>
      <!-- Wrench head ring -->
      <circle cx="0" cy="0" r="148" fill="url(#accent)"/>
      <circle cx="0" cy="0" r="90" fill="url(#bg)"/>
      <!-- Wrench head cutout detail -->
      <rect x="-148" y="-36" width="296" height="72" rx="36" fill="url(#bg)"/>
    </g>
  </g>

  <!-- Small sparkle top-right -->
  <g transform="translate(780, 240)" opacity="0.7">
    <line x1="0" y1="-28" x2="0" y2="28" stroke="#a5b4fc" stroke-width="8" stroke-linecap="round"/>
    <line x1="-28" y1="0" x2="28" y2="0" stroke="#a5b4fc" stroke-width="8" stroke-linecap="round"/>
    <line x1="-18" y1="-18" x2="18" y2="18" stroke="#a5b4fc" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <line x1="18" y1="-18" x2="-18" y2="18" stroke="#a5b4fc" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Small sparkle bottom-left -->
  <g transform="translate(244, 780)" opacity="0.5">
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#818cf8" stroke-width="6" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#818cf8" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
